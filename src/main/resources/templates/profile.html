<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - The Student Archive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/home">📚 The Student Archive</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/home">Home</a>
                <a class="nav-link" href="/search">Search</a>
                <a class="nav-link" sec:authorize="hasAnyRole('TEACHER', 'ADMIN')" href="/documents/upload">Upload</a>
                <a class="nav-link active" href="/profile">Profile</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header">
                        <h3>User Profile</h3>
                    </div>
                    <div class="card-body">
                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        
                        <div class="mb-3">
                            <label class="form-label"><strong>Name:</strong></label>
                            <p th:text="${user.name}"></p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label"><strong>Email:</strong></label>
                            <p th:text="${user.email}"></p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label"><strong>OAuth Provider:</strong></label>
                            <p th:text="${user.oauthProvider}"></p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label"><strong>Current Role:</strong></label>
                            <p th:text="${user.role}"></p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label"><strong>Member Since:</strong></label>
                            <p th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></p>
                        </div>
                        
                        <hr>
                        
                        <h5>Change Role</h5>
                        <form th:action="@{/profile/update-role}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Select Role:</label>
                                <select name="role" class="form-select">
                                    <option value="STUDENT">Student</option>
                                    <option value="TEACHER">Teacher</option>
                                    <option value="ADMIN">Admin</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">Update Role</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
