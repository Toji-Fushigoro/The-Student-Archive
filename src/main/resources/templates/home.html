<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - The Student Archive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .search-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 0;
        }
        .search-box {
            max-width: 700px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/home">📚 The Student Archive</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/home">Home</a>
                <a class="nav-link" href="/search">Search</a>
                <a class="nav-link" sec:authorize="hasAnyRole('TEACHER', 'ADMIN')" href="/documents/upload">Upload</a>
                <a class="nav-link" href="/profile">Profile</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    
    <div class="search-section">
        <div class="container">
            <h1 class="text-center mb-4">Find Your Study Materials</h1>
            <div class="search-box">
                <form action="/search" method="get">
                    <div class="input-group input-group-lg">
                        <input type="text" name="query" class="form-control" 
                               placeholder="Search for notes, previous year questions, study materials..."
                               required>
                        <button class="btn btn-light" type="submit">
                            🔍 Search
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <h3>Welcome, <span th:text="${user != null ? user.name : 'Guest'}"></span>!</h3>
                <p class="text-muted">Role: <span th:text="${user != null ? user.role : 'N/A'}"></span></p>
                
                <div class="row mt-4">
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5>📝 Notes</h5>
                                <p>Access comprehensive study notes</p>
                                <a href="/search?query=notes" class="btn btn-primary">Browse Notes</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5>📄 Previous Year Questions</h5>
                                <p>Practice with past exam papers</p>
                                <a href="/search?query=previous year questions" class="btn btn-primary">Browse Questions</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5>📚 Study Materials</h5>
                                <p>Additional learning resources</p>
                                <a href="/search?query=study material" class="btn btn-primary">Browse Materials</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
