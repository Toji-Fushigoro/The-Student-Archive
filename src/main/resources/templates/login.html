<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Student Archive - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .oauth-btn {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: 500;
        }
        .google-btn {
            background: #4285f4;
            color: white;
            border: none;
        }
        .github-btn {
            background: #333;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="login-card p-5">
                    <div class="text-center mb-4">
                        <h1 class="display-4">📚 The Student Archive</h1>
                        <p class="text-muted">Access college materials with ease</p>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <a href="/oauth2/authorization/google" class="btn oauth-btn google-btn">
                            <i class="bi bi-google"></i> Continue with Google
                        </a>
                        
                        <a href="/oauth2/authorization/github" class="btn oauth-btn github-btn">
                            <i class="bi bi-github"></i> Continue with GitHub
                        </a>
                    </div>
                    
                    <div class="mt-4 text-center">
                        <p class="text-muted small">
                            By logging in, you agree to our Terms of Service
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
