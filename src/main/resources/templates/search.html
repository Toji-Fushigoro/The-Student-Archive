<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - The Student Archive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .result-card {
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        .result-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .relevance-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/home">📚 The Student Archive</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/home">Home</a>
                <a class="nav-link active" href="/search">Search</a>
                <a class="nav-link" sec:authorize="hasAnyRole('TEACHER', 'ADMIN')" href="/documents/upload">Upload</a>
                <a class="nav-link" href="/profile">Profile</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <form action="/search" method="get">
                    <div class="input-group input-group-lg mb-4">
                        <input type="text" name="query" class="form-control" 
                               th:value="${query}"
                               placeholder="Search for notes, previous year questions, study materials..."
                               required>
                        <button class="btn btn-primary" type="submit">
                            🔍 Search
                        </button>
                    </div>
                </form>
                
                <div th:if="${query != null and totalResults != null}">
                    <p class="text-muted">Found <strong th:text="${totalResults}"></strong> results for "<span th:text="${query}"></span>"</p>
                </div>
                
                <div th:if="${results != null and !results.isEmpty()}">
                    <div class="row">
                        <div class="col-md-12" th:each="result : ${results}">
                            <div class="card result-card mb-3">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-start">
                                        <div class="flex-grow-1">
                                            <h5 class="card-title" th:text="${result.title}"></h5>
                                            <p class="card-text text-muted" th:text="${result.description}"></p>
                                            
                                            <div class="mb-2">
                                                <span class="badge bg-primary" th:text="${result.category}"></span>
                                                <span class="badge bg-secondary" th:text="${result.subject}"></span>
                                                <span th:if="${result.year != null}" class="badge bg-info" 
                                                      th:text="'Year: ' + ${result.year}"></span>
                                                <span th:if="${result.semester != null}" class="badge bg-warning text-dark" 
                                                      th:text="'Sem: ' + ${result.semester}"></span>
                                            </div>
                                            
                                            <small class="text-muted">
                                                Uploaded by <span th:text="${result.uploaderName}"></span> on 
                                                <span th:text="${#temporals.format(result.createdAt, 'yyyy-MM-dd')}"></span>
                                            </small>
                                        </div>
                                        
                                        <div class="text-end">
                                            <span class="badge relevance-badge text-white mb-2" 
                                                  th:text="${#numbers.formatPercent(result.relevanceScore, 0, 0)} + ' match'"></span>
                                            <br>
                                            <a th:href="@{/documents/download/{id}(id=${result.id})}" 
                                               class="btn btn-primary btn-sm">
                                                📥 Download
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div th:if="${query != null and (results == null or results.isEmpty())}">
                    <div class="alert alert-info text-center">
                        <h5>No results found</h5>
                        <p>Try different search terms or browse by category</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
